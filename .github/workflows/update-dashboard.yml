name: Update Zivor Dashboard

on:
  # 6:00 AM AEDT daily (UTC+11 = 19:00 UTC)
  # Note: during AEST (Apr-Oct, UTC+10) this fires at 5:00 AM local time
  schedule:
    - cron: '0 19 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install requests

      - name: Write config.json from secret
        env:
          CONFIG_JSON_B64: ${{ secrets.CONFIG_JSON_B64 }}
        run: |
          echo "$CONFIG_JSON_B64" | base64 --decode > config.json
          echo "config.json written ($(wc -c < config.json) bytes)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install wrangler
        run: npm install wrangler

      - name: Run dashboard pipeline
        run: python -u update_dashboard.py

      - name: Upload dashboard as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-html
          path: dashboard.html
          retention-days: 7
