name: Update Zivor Dashboard

on:
  # 6:00 AM AEDT (UTC+11) — October through March
  # 6:00 AM AEST (UTC+10) — April through September
  # Each cron only fires during its season so the workflow runs exactly once per day at 6 AM local time.
  # Note: during the DST switch weeks (early Apr / early Oct) it may be 1 hour off for a few days.
  schedule:
    - cron: '0 19 * 10,11,12,1,2,3 *'   # Oct-Mar: 19:00 UTC = 6 AM AEDT (UTC+11)
    - cron: '0 20 * 4,5,6,7,8,9 *'       # Apr-Sep: 20:00 UTC = 6 AM AEST (UTC+10)
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install requests

      - name: Write config.json from secret
        env:
          CONFIG_JSON_B64: ${{ secrets.CONFIG_JSON_B64 }}
        run: |
          echo "$CONFIG_JSON_B64" | base64 --decode > config.json
          echo "config.json written ($(wc -c < config.json) bytes)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install wrangler
        run: npm install wrangler

      - name: Run dashboard pipeline
        run: python -u update_dashboard.py

      - name: Upload dashboard as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-html
          path: dashboard.html
          retention-days: 7
