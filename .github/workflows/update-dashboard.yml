name: Update Zivor Dashboard

on:
  # 6:00 AM AEDT every day (AEDT = UTC+11, so 19:00 UTC year-round)
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python setup with pip cache ──────────────────────────────────────
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Playwright browser cache (~130 MB Chromium) ──────────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            playwright install chromium
          else
            playwright install chromium --with-deps
          fi

      # ── Config ───────────────────────────────────────────────────────────
      - name: Write config.json from secret
        env:
          CONFIG_JSON_B64: ${{ secrets.CONFIG_JSON_B64 }}
        run: |
          echo "$CONFIG_JSON_B64" | base64 --decode > config.json
          echo "config.json written ($(wc -c < config.json) bytes)"

      # ── Node / wrangler with npm cache ───────────────────────────────────
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache node_modules (wrangler)
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install wrangler
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm install wrangler

      # ── Main pipeline ────────────────────────────────────────────────────
      - name: Run dashboard pipeline (fetch + build dashboard.html)
        env:
          EBAY_OAUTH_REFRESH_ZIVOR: ${{ secrets.EBAY_OAUTH_REFRESH_ZIVOR }}
          EBAY_OAUTH_REFRESH_AMS:   ${{ secrets.EBAY_OAUTH_REFRESH_AMS }}
          EBAY_OAUTH_REFRESH_ATS:   ${{ secrets.EBAY_OAUTH_REFRESH_ATS }}
        run: python -u update_dashboard.py

      - name: Take hero snapshot (D-Flector + Retail cards only)
        run: python take_snapshot.py

      - name: Commit snapshot.png to repo (for Teams image hosting)
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add snapshot.png
          git diff --staged --quiet || git commit -m "Update snapshot [skip ci]"
          git push

      - name: Deploy to Cloudflare Pages
        run: |
          CF_TOKEN=$(python3 -c "import json; c=json.load(open('config.json')); print(c['cloudflare']['api_token'])")
          mkdir -p deploy_tmp
          cp dashboard.html deploy_tmp/index.html
          cp snapshot.png deploy_tmp/snapshot.png
          CLOUDFLARE_API_TOKEN=$CF_TOKEN ./node_modules/.bin/wrangler pages deploy deploy_tmp/ \
            --project-name dflector-dashboard \
            --branch main
          echo "Deploy complete -> https://dflector-dashboard.pages.dev"

      - name: Post snapshot card to Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python post_to_teams.py
